<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup 3 Hero Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">Startup 3</div>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Overview</a></li>
                <li><a href="#">Prices</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">Feedback</a></li>
            </ul>
            <a href="#" class="btn-purchase">Purchase</a>
        </nav>
    </header>

    <main class="hero-container">
        <section class="hero-content">
            <h1>Generate Awesome Web Pages</h1>
            <p>The most important part of the Startup is the samples. The samples form a set of 25 usable pages you can use as is or you can add new blocks.</p>
            <a href="#" class="btn-learn">Learn More</a>
        </section>

        <section class="form-container">
            <div class="sign-up-card">
                <h2>Sign Up Now</h2>
                <form>
                    <input type="email" placeholder="Your email">
                    <input type="password" placeholder="Your password">
                    <div class="checkbox-group">
                        <input type="checkbox" id="terms">
                        <label for="terms">I agree to the Terms of Service.</label>
                    </div>
                    <button type="submit" class="btn-signin">Sign In</button>
                    <div class="divider"><span>or</span></div>
                    <button type="button" class="btn-twitter">Login via Twitter</button>
                </form>
                <p class="footer-text">Do you have an Account? <a href="#">Sign In</a></p>
            </div>
        </section>
    </main>
</body>
</html>
